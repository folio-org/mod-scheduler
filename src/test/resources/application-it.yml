spring:
  application:
    version: 0.0.1-TEST
  datasource:
    username: folio_admin
    password: qwerty123
  hikari:
    data-source-properties:
      preparedStatementCacheQueries: 0
  jpa:
    show-sql: true

folio:
  environment: it

cache:
  keycloak-user-id:
    ttl: 1800s
    max-size: 200
  system-user-id:
    ttl: 1800s
    max-size: 200
  client-secret-key:
    ttl: ${CLIENT_SECRET_KEY_CACHE_TTL:6000s}
    max-size: ${CLIENT_SECRET_KEY_CACHE_MAX_SIZE:200}

okapi:
  url: http://localhost:9130
  token: test-token

application:
  secret-store:
    type: EPHEMERAL
    ephemeral:
      content:
        folio_master_folio-backend-admin-client: ${KC_ADMIN_CLIENT_SECRET:supersecret}
        folio_test_impersonation-client: impersonation-client-secret
  kafka:
    consumer:
      filtering:
        tenant-filter:
          enabled: false
  retry:
    config:
      system-user:
        retry-delay: 100ms
        max-delay: 250ms
        retry-attempts: 5
        retry-multiplier: 1.5
  keycloak:
    admin:
      client-id: folio-backend-admin-client
    tls:
      enabled: true
      trust-store-path: classpath:certificates/test.truststore.jks
      trust-store-password: secretpassword
      trust-store-type: JKS
